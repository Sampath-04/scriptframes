# ai-toolkit (https://github.com/ostris/ai-toolkit) FLUX LoRA training config.
# Edit `name`, the sample prompts, and the dataset/trigger to match your character.
job: extension
config:
  name: my_character_lora
  process:
    - type: sd_trainer
      training_folder: /workspace/lora_output
      device: cuda:0
      network:
        type: lora
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: /workspace/dataset
          caption_ext: txt
          resolution: [768, 1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        lr: 1e-4
        optimizer: adamw8bit
        dtype: bf16
        # In-training preview sampling can crash on bleeding-edge transformers;
        # disable it and evaluate the finished LoRA with `scriptframes generate`.
        disable_sampling: true
        skip_first_sample: true
      model:
        name_or_path: black-forest-labs/FLUX.1-dev
        is_flux: true
        quantize: true
      sample:
        sampler: flowmatch
        sample_every: 100000
        width: 1344
        height: 768
        prompts:
          - "mychar, standing in a dramatic landscape"
        seed: 42
