# Example profile: a cinematic character channel (FLUX.1-dev + a character LoRA).
# Copy this file, point lora_path at your LoRA, and edit the character fields.
llm_model: "Qwen/Qwen2.5-14B-Instruct"
flux_model: "black-forest-labs/FLUX.1-dev"
lora_path: "/workspace/models/character_lora.safetensors"
lora_scale: 0.8
base_seed: 1234567
width: 1344
height: 768
steps: 28
guidance: 3.5
min_beats: 12
max_beats: 40
max_parse_retries: 3
trigger_word: "yourtrigger"
style_suffix: "cinematic, highly detailed, dramatic lighting, epic atmosphere"
character_brief: "Describe your recurring character and the visual style here so the LLM writes prompts that feature them in every scene."
# Optional PiD upscaling (needs runpod/setup.sh to have installed PiD)
upscale: "none"        # set to "pid" to enable
pid_resolution: "2k"   # "2k" or "4k"
pid_dir: "/workspace/PiD"
