# Example profile: a psychology channel using a trained character LoRA ("psymascot").
# This is the real-world pattern — a custom-trained mascot driving every scene.
# Note the character_brief: it forces the LLM to anchor every prompt to the mascot
# and never substitute a generic person (the #1 cause of character drift).
llm_model: "Qwen/Qwen2.5-14B-Instruct"
flux_model: "black-forest-labs/FLUX.1-dev"
lora_path: "/workspace/models/psymascot_lora.safetensors"
lora_scale: 1.3
base_seed: 1234567
width: 1344
height: 768
steps: 32
guidance: 3.5
min_beats: 12
max_beats: 40
max_parse_retries: 3
trigger_word: "psymascot"
style_suffix: "flat 2D vector cartoon, bold black outlines, flat solid colors, no shading, plain background"
character_brief: "CRITICAL: every image_prompt features the SAME mascot 'psymascot' as the LARGE, PROMINENT main character - a round flat-2D-vector cartoon with a cream round head, brown hair tuft, big expressive eyes, rosy cheeks, a mustard-yellow sweater and blue pants. Always begin each image_prompt with 'psymascot' and keep it identical across every scene. VARY its placement scene to scene - sometimes on the left, sometimes the right, sometimes center - based on what the scene emphasizes, leaving room on the opposite side for symbolic props/icons or captions (storm cloud, warning sign, thought bubble, hearts); do not put it dead-center every time. NEVER replace psymascot with a man, woman, person, boy, child, animal, or a human name. If a beat needs others, add them as separate 'other people' (generic, may look different) who are NOT psymascot. Keep backgrounds simple/plain rather than busy. Vary pose, framing, expression, and icons."
upscale: "pid"
pid_resolution: "2k"
pid_scale: 2
pid_dir: "/workspace/PiD"
