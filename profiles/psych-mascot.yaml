# Example profile: a psychology channel using a trained character LoRA ("psymascot").
# This is the real-world pattern — a custom-trained mascot driving every scene.
# Note the character_brief: it forces the LLM to anchor every prompt to the mascot
# and never substitute a generic person (the #1 cause of character drift).
llm_model: "Qwen/Qwen2.5-14B-Instruct"
flux_model: "black-forest-labs/FLUX.1-dev"
lora_path: "/workspace/models/psymascot_lora.safetensors"
lora_scale: 1.0
base_seed: 1234567
width: 1344
height: 768
steps: 32
guidance: 3.5
min_beats: 12
max_beats: 40
max_parse_retries: 3
trigger_word: "psymascot"
style_suffix: "flat 2D vector cartoon, bold black outlines, flat solid colors, no shading, plain background"
character_brief: "CRITICAL: every image_prompt MUST feature the SAME single recurring mascot named psymascot. Always begin each image_prompt with 'psymascot' and describe it as a small round cartoon character with a cream round head, a brown hair tuft, big expressive eyes, rosy cheeks, a mustard-yellow sweater and blue pants. NEVER describe it as a man, woman, person, boy, child, or use a human name - it is always the psymascot mascot. Vary only the setting, pose, and emotion to match the narration."
upscale: "pid"
pid_resolution: "2k"
pid_scale: 2
pid_dir: "/workspace/PiD"
