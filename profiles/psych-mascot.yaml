# Mascot profile for a psychology channel, using FLUX.2 reference-based consistency.
# The character is locked by the reference images in references_dir (closeup/ + full/),
# NOT by a trained LoRA. Put your anchor packs at references_dir before generating.
llm_model: "Qwen/Qwen2.5-14B-Instruct"
flux2_model: "black-forest-labs/FLUX.2-klein-9B"
references_dir: "/workspace/references"   # must contain closeup/ and full/ subfolders
ref_count: 8                              # how many anchors to feed per image
base_seed: 1234567
width: 1344
height: 768
steps: 6                                  # klein is distilled -> few steps
min_beats: 12
max_beats: 40
max_parse_retries: 3
character_brief: "Every scene features the SAME recurring cartoon mascot: a round character with a cream round head, a brown hair tuft, big expressive eyes, rosy cheeks, a mustard-yellow t-shirt and dark blue pants. It is a flat 2D vector cartoon. Always depict this same mascot; never replace it with a generic man, woman, person, boy or animal."
style_suffix: "flat 2D vector cartoon, bold black outlines, flat solid colors, plain cream background"
upscale: "pid"
pid_resolution: "2k"
pid_scale: 2
pid_backbone: "flux2"
pid_dir: "/workspace/PiD"
